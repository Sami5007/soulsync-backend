<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00e5ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Soul-Sync" />
    <meta name="description" content="AI-Powered Mental Wellness Support" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/Logo-soulsync.png" />
    <link rel="apple-touch-icon" href="/Logo-soulsync.png" />
    <title>Soul-Sync | Mental Wellness Companion</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((r) => console.log('SW registered:', r.scope))
            .catch((e) => console.log('SW failed:', e));
        });
      }
    </script>
  </body>
</html>
